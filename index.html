<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H&A | The Wedding Editorial</title>
    
    <!-- Frameworks & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">

    <!-- Firebase SDKs - Individual modules must be script type="module" -->
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>

    <style>
        body {
            background-color: #f8f8f8;
            color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Pinyon Script', cursive; }
        
        /* Custom scrollbar for an editorial feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f8f8f8; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }

        .reveal-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            animation: textUp 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        @keyframes textUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }

        .img-zoom {
            overflow: hidden;
        }
        .img-zoom img {
            transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .img-zoom:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'wedding-editorial-v1';

        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth initialization failed", error);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, setUser);

                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    unsubscribe();
                };
            }, []);

            return (
                <div className="relative">
                    {/* Persistent Header */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 px-6 py-4 flex justify-between items-center ${scrolled ? 'bg-white border-b border-gray-200 py-3' : 'bg-transparent'}`}>
                        <div className="font-black text-2xl tracking-tighter">H+A</div>
                        <div className="flex gap-8 text-[10px] font-black uppercase tracking-[0.2em]">
                            <a href="#story" className="hover:line-through transition-all">Story</a>
                            <a href="#details" className="hover:line-through transition-all">Details</a>
                            <a href="#rsvp" className="bg-black text-white px-4 py-1.5 -mt-1 hover:bg-gray-800 transition-colors">RSVP</a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="min-h-screen pt-32 px-6 flex flex-col">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-end">
                            <div className="lg:col-span-7 overflow-hidden">
                                <h1 className="text-[12vw] lg:text-[10vw] font-black leading-[0.85] tracking-tighter uppercase reveal-text">
                                    HANNAH<br/>
                                    <span className="text-gray-300">&</span> AURELIUS
                                </h1>
                            </div>
                            <div className="lg:col-span-5 pb-4">
                                <p className="font-serif italic text-2xl lg:text-3xl text-gray-600 max-w-sm">
                                    A celebration of love in the heart of Kyoto.
                                </p>
                            </div>
                        </div>

                        {/* Featured Image */}
                        <div className="mt-12 mb-24 lg:grid lg:grid-cols-12 gap-8">
                            <div className="lg:col-start-2 lg:col-span-10 relative">
                                <div className="img-zoom aspect-[4/5] lg:aspect-[16/9] w-full bg-gray-100 shadow-2xl">
                                    <img 
                                        src="image_f14c23.png" 
                                        alt="Hannah and Aurelius" 
                                        className="w-full h-full object-cover"
                                        onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1600&q=80"; }}
                                    />
                                </div>
                                <div className="absolute -bottom-8 -right-4 bg-[#1a1a1a] text-white p-8 hidden lg:block">
                                    <p className="text-[10px] tracking-[0.4em] uppercase font-black mb-2">The Date</p>
                                    <p className="text-4xl font-black tracking-tighter">06.28.26</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Details Grid */}
                    <section id="details" className="px-6 py-24 bg-white border-y border-gray-100">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-16">
                            <div>
                                <span className="text-[10px] font-black uppercase tracking-[0.5em] text-gray-400 block mb-6">Location</span>
                                <h3 className="text-4xl font-black uppercase tracking-tighter mb-4">The Garden<br/>Pavilion</h3>
                                <p className="font-serif text-lg italic text-gray-600">Higashiyama District, Kyoto</p>
                            </div>
                            <div>
                                <span className="text-[10px] font-black uppercase tracking-[0.5em] text-gray-400 block mb-6">Schedule</span>
                                <h3 className="text-4xl font-black uppercase tracking-tighter mb-4">4:00 PM</h3>
                                <p className="font-serif text-lg italic text-gray-600">Ceremony followed by dinner and dancing beneath the moon.</p>
                            </div>
                            <div>
                                <span className="text-[10px] font-black uppercase tracking-[0.5em] text-gray-400 block mb-6">Attire</span>
                                <h3 className="text-4xl font-black uppercase tracking-tighter mb-4">Cocktail<br/>Attire</h3>
                                <p className="font-serif text-lg italic text-gray-600">In shades of cherry blossom and stone.</p>
                            </div>
                        </div>
                    </section>

                    {/* Minimalist RSVP CTA */}
                    <section id="rsvp" className="py-40 px-6 text-center">
                        <div className="inline-block relative">
                            <span className="font-script text-7xl text-gray-200 absolute -top-12 -left-12 -z-10">RSVP</span>
                            <h2 className="text-6xl lg:text-8xl font-black tracking-tighter uppercase mb-8">Are you joining us?</h2>
                        </div>
                        <div className="mt-8 flex flex-col items-center">
                            <button className="bg-black text-white px-12 py-5 text-xs font-black uppercase tracking-[0.5em] hover:bg-gray-800 transition-all hover:px-16">
                                Confirm Attendance
                            </button>
                            <p className="mt-6 font-serif italic text-gray-400">Kindly reply by May 15, 2026</p>
                        </div>
                    </section>

                    {/* Footer Editorial */}
                    <footer className="px-6 py-12 border-t border-gray-200 flex flex-col lg:flex-row justify-between items-end gap-8">
                        <div>
                            <p className="text-[10vw] font-black leading-none tracking-tighter text-gray-100 select-none">KYOTO</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] mb-2">Designed for</p>
                            <p className="text-xl font-black uppercase tracking-tighter">Hannah & Aurelius</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
