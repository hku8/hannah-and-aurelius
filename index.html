<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah & Michael</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (to interpret JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Lato"', 'sans-serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9',
                            100: '#f5f5f4',
                            200: '#e7e5e4',
                            300: '#d6d3d1',
                            400: '#a8a29e',
                            500: '#78716c',
                            600: '#57534e',
                            700: '#44403c',
                            800: '#292524',
                            900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar hiding for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-stone-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icon Components (Inline SVG for standalone usage) ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Menu = (props) => <IconBase {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
        const VolumeX = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></IconBase>;
        const Heart = (props) => <IconBase {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconBase>;
        const MapPin = (props) => <IconBase {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconBase>;
        const Gift = (props) => <IconBase {...props}><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></IconBase>;
        const Calendar = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
        const ArrowDown = (props) => <IconBase {...props}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></IconBase>;

        // --- Main App Code ---

        const WEDDING_MUSIC_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; 

        const Section = ({ id, className, children }) => (
          <section id={id} className={`min-h-screen w-full flex flex-col justify-center items-center py-20 px-6 ${className}`}>
            {children}
          </section>
        );

        const NavLink = ({ href, children, onClick }) => (
          <a 
            href={href} 
            onClick={onClick}
            className="text-3xl font-serif text-stone-900 hover:text-stone-500 transition-colors py-2 block tracking-tight"
          >
            {children}
          </a>
        );

        function App() {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [isPlaying, setIsPlaying] = useState(false);
          const [entered, setEntered] = useState(false);
          const [loaded, setLoaded] = useState(false);
          
          const audioRef = useRef(null);

          useEffect(() => {
            setLoaded(true);
          }, []);

          useEffect(() => {
            if (audioRef.current) {
              if (isPlaying) {
                audioRef.current.play().catch(e => console.log("Playback failed:", e));
              } else {
                audioRef.current.pause();
              }
            }
          }, [isPlaying]);

          const handleEnterSite = () => {
            setEntered(true);
            setIsPlaying(true);
          };

          const toggleMenu = () => setIsMenuOpen(!isMenuOpen);
          const toggleMusic = () => setIsPlaying(!isPlaying);

          const OverlayWrapper = ({ children, onClick, className = "" }) => (
            <div 
              className={`fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md h-full z-50 flex flex-col items-center justify-center transition-all duration-1000 ${className}`}
              onClick={onClick}
            >
              {children}
            </div>
          );

          if (!entered) {
            return (
              <div className="min-h-screen w-full bg-stone-200 flex justify-center items-center">
                <OverlayWrapper onClick={handleEnterSite} className="bg-[#F5F5F0] cursor-pointer shadow-2xl">
                  <div className="text-center p-6 animate-pulse">
                    <p className="text-stone-500 font-sans tracking-[0.2em] uppercase text-xs mb-4">The Wedding of</p>
                    <h1 className="font-serif text-5xl text-stone-900 mb-6 tracking-tighter">Sarah & Michael</h1>
                    <div className="w-px h-12 bg-stone-300 mx-auto mb-4"></div>
                    <p className="text-stone-400 font-sans tracking-widest uppercase text-xs">Tap to Enter</p>
                  </div>
                </OverlayWrapper>
              </div>
            );
          }

          return (
            <div className="min-h-screen w-full bg-stone-200 flex justify-center items-start overflow-y-auto overflow-x-hidden">
              
              {/* Mobile Container */}
              <div className="w-full max-w-md min-h-screen bg-[#F5F5F0] shadow-2xl relative font-sans text-stone-900 selection:bg-stone-200">
                <audio ref={audioRef} src={WEDDING_MUSIC_URL} loop />

                <nav className="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md z-40 px-6 py-6 flex justify-between items-start pointer-events-none mix-blend-difference text-white">
                  <div className="pointer-events-auto">
                    <button 
                      onClick={toggleMenu} 
                      className="flex items-center gap-2 group"
                      aria-label="Menu"
                    >
                      <div className="p-2 border border-white/20 rounded-full group-hover:bg-white group-hover:text-black transition-all duration-300">
                        {isMenuOpen ? <X size={20} /> : <Menu size={20} />}
                      </div>
                    </button>
                  </div>

                  <div className="pointer-events-auto">
                    <button 
                      onClick={toggleMusic} 
                      className="flex items-center gap-2 group flex-row-reverse"
                      aria-label={isPlaying ? "Mute Music" : "Play Music"}
                    >
                      <div className="p-2 border border-white/20 rounded-full group-hover:bg-white group-hover:text-black transition-all duration-300">
                        {isPlaying ? <Volume2 size={20} /> : <VolumeX size={20} />}
                      </div>
                    </button>
                  </div>
                </nav>

                <div 
                  className={`fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md h-full bg-[#F5F5F0] z-30 flex flex-col items-center justify-center transition-all duration-700 ease-[cubic-bezier(0.76,0,0.24,1)] ${isMenuOpen ? 'translate-y-0 opacity-100 pointer-events-auto' : '-translate-y-full opacity-0 pointer-events-none'}`}
                >
                  <nav className="text-center space-y-6">
                    <NavLink href="#home" onClick={toggleMenu}>Home</NavLink>
                    <NavLink href="#invite" onClick={toggleMenu}>The Invite</NavLink>
                    <NavLink href="#rsvp" onClick={toggleMenu}>RSVP</NavLink>
                    <NavLink href="#story" onClick={toggleMenu}>Our Story</NavLink>
                    <NavLink href="#registry" onClick={toggleMenu}>Registry</NavLink>
                    <NavLink href="#location" onClick={toggleMenu}>Location</NavLink>
                  </nav>
                  <div className="absolute bottom-12 text-stone-400 text-xs tracking-widest uppercase">
                    09 . 24 . 26
                  </div>
                </div>

                {/* 1. Landing Page */}
                <section id="home" className="relative h-screen w-full overflow-hidden bg-[#F5F5F0]">
                  <div className="absolute inset-0 flex flex-col items-center justify-center z-10 px-4 mt-[-4rem]">
                     <div className={`transition-all duration-[1500ms] ease-out transform ${loaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                        <p className="text-center font-sans uppercase tracking-[0.3em] text-[0.65rem] mb-4 text-stone-600">Save The Date</p>
                        <h1 className="text-6xl leading-[0.85] font-serif text-center text-stone-900 tracking-tighter mix-blend-overlay">
                          Sarah <span className="font-light italic font-serif block text-4xl mt-2">&</span> Michael
                        </h1>
                        <p className="text-center font-serif italic text-lg mt-6 text-stone-600">September 24th, 2026</p>
                     </div>
                  </div>

                  <div 
                    className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-[85%] h-[55%] transition-all duration-[2000ms] delay-300 ease-out transform ${loaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-24'}`}
                  >
                     <div className="w-full h-full rounded-t-[10rem] overflow-hidden relative shadow-2xl">
                       <div className="absolute inset-0 bg-stone-900/10 z-10"></div>
                       <img 
                         src="https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" 
                         alt="Couple" 
                         className="w-full h-full object-cover"
                       />
                     </div>
                  </div>
                  
                  <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 animate-bounce text-stone-900 z-20">
                    <ArrowDown size={16} strokeWidth={1} />
                  </div>
                </section>

                {/* 2. Invite Intro */}
                <Section id="invite" className="bg-[#F5F5F0]">
                  <div className="w-full text-center relative px-2">
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-8 text-[8rem] text-stone-200 opacity-50 font-serif leading-none select-none pointer-events-none">
                      &
                    </div>
                    <h2 className="text-3xl font-serif text-stone-900 mb-6 relative z-10">We're getting married.</h2>
                    <p className="text-base text-stone-600 leading-relaxed font-light font-serif">
                      We invite you to join us in the vineyards of Napa Valley as we celebrate our love.
                      Expect good wine, great company, and a night to remember.
                    </p>
                    <div className="mt-10 flex flex-row justify-center gap-12 border-t border-stone-300 pt-8">
                       <div>
                         <span className="block text-[0.6rem] uppercase tracking-widest text-stone-400 mb-2">When</span>
                         <span className="font-serif text-lg">Sept 24, 2026</span>
                       </div>
                       <div>
                         <span className="block text-[0.6rem] uppercase tracking-widest text-stone-400 mb-2">Where</span>
                         <span className="font-serif text-lg">Napa Valley</span>
                       </div>
                    </div>
                  </div>
                </Section>

                {/* 3. RSVP Section */}
                <Section id="rsvp" className="bg-stone-200">
                  <div className="bg-[#F5F5F0] p-8 w-full text-center shadow-xl relative overflow-hidden group">
                    <div className="absolute top-0 left-0 w-full h-1 bg-stone-900 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-700"></div>
                    
                    <p className="text-[0.6rem] uppercase tracking-[0.25em] text-stone-400 mb-6">Répondez s'il vous plaît</p>
                    <h2 className="text-3xl font-serif mb-6 tracking-tight">Are you with us?</h2>
                    <p className="text-stone-600 mb-8 font-serif italic text-sm">Kindly respond by August 1st</p>
                    
                    <a 
                      href="#" 
                      className="inline-block border border-stone-900 text-stone-900 px-8 py-3 hover:bg-stone-900 hover:text-white transition-all duration-300 uppercase tracking-widest text-[0.65rem]"
                    >
                      RSVP Now
                    </a>
                  </div>
                </Section>

                {/* 4. Our Story */}
                <Section id="story" className="bg-[#F5F5F0]">
                  <div className="flex flex-col items-center gap-8 w-full">
                    <div className="w-full h-[50vh] relative">
                       <div className="w-full h-full rounded-t-[10rem] overflow-hidden shadow-lg bg-stone-300">
                         <img 
                           src="https://images.unsplash.com/photo-1522673607200-1645062cd495?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                           alt="Couple laughing" 
                           className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000"
                         />
                       </div>
                    </div>
                    
                    <div className="w-full space-y-6 text-center md:text-left">
                      <h2 className="text-4xl font-serif tracking-tighter">It started with <br/> <span className="italic font-light">coffee.</span></h2>
                      <div className="w-12 h-px bg-stone-900 mx-auto md:mx-0"></div>
                      <p className="text-stone-600 leading-relaxed font-serif text-base text-justify">
                        Five years ago, Michael spilled his latte. Sarah offered a napkin. 
                        The rest is a blur of airports, sunday mornings, and one golden retriever named Barnaby.
                      </p>
                      <div className="pt-2 flex justify-center md:justify-start">
                         <Heart className="w-5 h-5 text-stone-400" />
                      </div>
                    </div>
                  </div>
                </Section>

                {/* 5. Registry/Gifts */}
                <Section id="registry" className="bg-stone-900 text-[#F5F5F0]">
                  <div className="text-center w-full">
                    <Gift className="w-6 h-6 mx-auto text-stone-400 mb-6" />
                    <h2 className="text-4xl font-serif mb-10 tracking-tight">Registry</h2>
                    
                    <div className="flex flex-col gap-px bg-stone-800 border border-stone-800">
                      {['Crate & Barrel', 'Amazon Home', 'Honeyfund'].map((store) => (
                        <a key={store} href="#" className="bg-stone-900 py-8 hover:bg-stone-800 transition-colors group flex items-center justify-center">
                          <span className="text-lg font-serif italic text-stone-400 group-hover:text-white transition-colors">{store}</span>
                        </a>
                      ))}
                    </div>
                  </div>
                </Section>

                {/* 6. Location */}
                <Section id="location" className="p-0 bg-[#F5F5F0]">
                  <div className="w-full h-screen relative flex items-center justify-center">
                     <div className="absolute inset-0 z-0">
                       <img 
                         src="https://images.unsplash.com/photo-1544161513-0179fe746fd5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
                         alt="Vineyard"
                         className="w-full h-full object-cover"
                       />
                       <div className="absolute inset-0 bg-stone-900/40"></div>
                     </div>
                     
                     <div className="relative z-10 bg-[#F5F5F0] p-10 w-[85%] text-center shadow-2xl">
                        <span className="text-[0.6rem] uppercase tracking-[0.3em] text-stone-500 mb-4 block">The Venue</span>
                        <h2 className="text-3xl font-serif mb-2">The Grand Estate</h2>
                        <p className="font-serif italic text-stone-600 mb-6 text-sm">Napa Valley, California</p>
                        
                        <div className="space-y-3 text-xs font-sans text-stone-500 uppercase tracking-widest border-t border-stone-200 pt-6">
                           <div className="flex justify-between">
                             <span>Ceremony</span>
                             <span>4:00 PM</span>
                           </div>
                           <div className="flex justify-between">
                             <span>Dinner</span>
                             <span>6:00 PM</span>
                           </div>
                        </div>
                        
                        <button className="mt-8 w-full bg-stone-900 text-white py-3 uppercase tracking-widest text-[0.65rem] hover:bg-stone-700 transition-colors">
                          Get Directions
                        </button>
                     </div>
                  </div>
                </Section>

                <footer className="bg-[#F5F5F0] py-12 text-center border-t border-stone-200">
                  <h2 className="font-serif text-2xl text-stone-900 mb-3">S & M</h2>
                  <p className="text-stone-400 text-[0.6rem] uppercase tracking-widest">&copy; 2026 Sarah & Michael</p>
                </footer>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
