<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="2.0">
    <title>Hannah & Aurelius Wedding</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400;1,700&family=Pinyon+Script&display=swap');
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .font-script { font-family: 'Pinyon Script', cursive; }
        
        .ampersand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            display: inline-block;
            text-transform: none;
            line-height: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        
        body::-webkit-scrollbar { display: none; }
        body { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            overflow-x: hidden; 
            width: 100%;
            background-color: #fdf7f7;
            color: #452b2b;
        }

        .thin-hr {
            height: 1.5px;
            background-color: #d9c5c7;
            border: none;
        }

        .full-bleed-image {
            width: 100vw;
            margin-left: calc(50% - 50vw);
            margin-right: calc(50% - 50vw);
            max-width: 100vw;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconAttr = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', iconAttr);
                    i.style.width = `${size}px`;
                    i.style.height = `${size}px`;
                    i.className = className;
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': strokeWidth, 'width': size, 'height': size }
                    });
                }
            }, [name, size, strokeWidth, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const CherryBlossomSVG = ({ className = "" }) => (
            <div className={`relative ${className}`}>
                {[0, 72, 144, 216, 288].map((deg) => (
                    <div key={deg} className="absolute inset-0 origin-center" style={{ transform: `rotate(${deg}deg) translateY(-25%)` }}>
                        <svg width="100%" height="100%" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 22 C 16 16, 18 8, 14 4 C 13 5.5, 11 5.5, 10 4 C 6 8, 8 16, 12 22 Z" />
                        </svg>
                    </div>
                ))}
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[15%] h-[15%] rounded-full bg-[#d49999]/40" />
            </div>
        );

        const ExactFloralEmblem = ({ className = "" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 42C50 25 35 15 25 25C15 35 25 50 42 50" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round"/>
                <path d="M58 50C75 50 85 35 75 25C65 15 50 25 50 42" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round"/>
                <path d="M50 58C50 75 65 85 75 75C85 65 75 50 58 50" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round"/>
                <path d="M42 50C25 50 15 65 25 75C35 85 50 75 50 58" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round"/>
                <circle cx="50" cy="50" r="7" stroke="currentColor" strokeWidth="3.5"/>
                <line x1="50" y1="36" x2="50" y2="43" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
                <line x1="50" y1="64" x2="50" y2="57" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
                <line x1="36" y1="50" x2="43" y2="50" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
                <line x1="64" y1="50" x2="57" y2="50" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
            </svg>
        );

        const ScatteredBlossoms = () => {
            const items = [
                { top: '8%', left: '5%', rot: 45, scale: 1, type: 'flower', opacity: 0.6 },
                { top: '15%', left: '85%', rot: -15, scale: 0.8, type: 'petal', opacity: 0.8 },
                { top: '35%', left: '8%', rot: 75, scale: 0.6, type: 'petal', opacity: 0.5 },
                { top: '45%', left: '92%', rot: 20, scale: 1.2, type: 'flower', opacity: 0.4 },
                { top: '65%', left: '12%', rot: -45, scale: 0.9, type: 'petal', opacity: 0.7 },
                { top: '80%', left: '88%', rot: -30, scale: 0.8, type: 'flower', opacity: 0.5 },
                { top: '95%', left: '50%', rot: 15, scale: 1.1, type: 'flower', opacity: 0.3 },
            ];
            return (
                <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden min-h-full">
                    {items.map((item, i) => (
                        <div key={i} className="absolute text-[#e6baba]" style={{ top: item.top, left: item.left, transform: `rotate(${item.rot}deg) scale(${item.scale})`, opacity: item.opacity }}>
                            {item.type === 'flower' ? <CherryBlossomSVG className="w-12 h-12 -mt-6 -ml-6" /> : <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22 C 18 16, 20 6, 15 2 C 13.5 4, 10.5 4, 9 2 C 4 6, 6 16, 12 22 Z" /></svg>}
                        </div>
                    ))}
                </div>
            );
        };

        const Home = ({ onNavigate }) => {
            return (
                <div className="flex flex-col items-center animate-fade-in">
                    <div className="mb-12 px-6 w-full max-w-4xl border-l-2 border-[#d9c5c7] py-4 text-left md:ml-12">
                        <p className="text-[11px] font-bold tracking-[0.3em] text-[#452b2b] mb-1 uppercase">EST. 2026</p>
                        <h1 className="text-6xl md:text-8xl font-black text-[#452b2b] tracking-tighter leading-none mb-4 uppercase">
                            HANNAH<br/>
                            <span className="text-[#d9c5c7]">&</span> AURELIUS
                        </h1>
                        <p className="font-sans font-bold text-xs md:text-sm tracking-[0.2em] text-[#8a7373] uppercase bg-white inline-block px-2 py-1">Save The Date: June 28, 2026</p>
                    </div>
                    
                    <div className="full-bleed-image mb-24 overflow-hidden">
                        <img 
                            src="https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=2000&q=80" 
                            alt="Cherry Blossoms" 
                            className="w-full h-auto block object-cover" 
                        />
                    </div>

                    <div className="w-full max-w-4xl mx-auto px-6 mb-24 text-center">
                        <div className="flex justify-center mb-10">
                            <ExactFloralEmblem className="w-14 h-14 text-[#d9c5c7]" />
                        </div>
                        <h2 className="font-serif italic text-2xl md:text-3xl text-[#452b2b] mb-6 tracking-tight opacity-90">Save the Date</h2>
                        <p className="font-serif text-[#8a7373] text-base md:text-lg mb-16 max-w-md mx-auto leading-relaxed">
                            Join us as we celebrate our love amidst the cherry blossoms of Kyoto.
                        </p>
                        <div className="thin-hr mb-12 max-w-2xl mx-auto"></div>
                        <div className="flex flex-row items-center justify-center max-w-2xl mx-auto">
                            <div className="flex-1 text-center px-2">
                                <p className="text-[9px] md:text-[11px] tracking-[0.3em] md:tracking-[0.4em] text-[#8a7373] uppercase mb-2 font-bold">When</p>
                                <p className="font-serif text-sm md:text-xl text-[#452b2b] tracking-wide font-medium">Sunday, June 28th</p>
                            </div>
                            <div className="block w-[1px] h-8 md:h-10 bg-[#d9c5c7]"></div>
                            <div className="flex-1 text-center px-2">
                                <p className="text-[9px] md:text-[11px] tracking-[0.3em] md:tracking-[0.4em] text-[#8a7373] uppercase mb-2 font-bold">Where</p>
                                <p className="font-serif text-sm md:text-xl text-[#452b2b] tracking-wide font-medium">The Garden Pavilion</p>
                            </div>
                        </div>
                        <div className="thin-hr mt-12 max-w-2xl mx-auto"></div>
                    </div>

                    <div className="max-w-xl mx-auto px-10 md:px-16 mb-24 mt-12 text-center">
                        <p className="text-[10px] md:text-[11px] tracking-[0.4em] text-[#8a7373] mb-6 uppercase font-bold opacity-80">We Are Getting Married</p>
                        <div className="flex items-center justify-center gap-4 md:gap-5 mb-5">
                            <span className="font-serif text-lg md:text-2xl text-[#452b2b] font-medium uppercase tracking-[0.2em] md:tracking-[0.25em]">HANNAH</span>
                            <Icon name="Heart" size={10} className="fill-[#8a7373] text-[#8a7373] opacity-40" />
                            <span className="font-serif text-lg md:text-2xl text-[#452b2b] font-medium uppercase tracking-[0.2em] md:tracking-[0.25em]">AURELIUS</span>
                        </div>
                        <p className="font-serif text-[12px] md:text-sm text-[#8a7373] mb-12 tracking-[0.3em] opacity-90 uppercase">JUNE 28, 2026</p>
                        <div className="space-y-6">
                            <p className="text-[9px] md:text-[10px] tracking-[0.4em] text-[#8a7373] uppercase font-bold opacity-70">Invitation</p>
                            <div className="font-serif text-[#452b2b] leading-[1.6] text-base md:text-lg italic opacity-90">
                                <p className="mb-4">To our dearest friends and family, we would be honored to have you be a part of our special day.</p>
                                <p>We would like to formally invite you to our wedding!</p>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-4xl mx-auto px-6 mb-40 text-center">
                        <div className="flex justify-center mb-10">
                            <Icon name="CheckCircle2" className="w-12 h-12 text-[#d9c5c7]" strokeWidth={1} />
                        </div>
                        <h2 className="font-serif italic text-2xl md:text-3xl text-[#452b2b] mb-6 tracking-tight opacity-90">Will You Share the Joy With Us?</h2>
                        <div className="thin-hr mb-12 max-w-2xl mx-auto"></div>
                        <button 
                            onClick={() => onNavigate('RSVP')}
                            className="group relative px-10 md:px-12 py-5 bg-transparent border border-[#d9c5c7] text-[#452b2b] font-bold tracking-[0.3em] uppercase hover:bg-[#452b2b] hover:text-white transition-all duration-500 rounded-sm overflow-hidden text-sm md:text-base"
                        >
                            <span className="relative z-10">RSVP Online</span>
                            <div className="absolute inset-0 bg-[#452b2b] translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out z-0"></div>
                        </button>
                    </div>
                </div>
            );
        };

        const RSVP = () => (
            <div className="max-w-xl mx-auto animate-fade-in pb-20 pt-10 px-4">
                <div className="text-center mb-14">
                    <p className="text-xs tracking-[0.3em] text-[#8a7373] mb-4 uppercase font-bold">Kindly Reply</p>
                    <h2 className="font-serif italic text-4xl md:text-5xl text-[#452b2b] mb-4">RSVP</h2>
                </div>
                <form className="space-y-8 bg-white/50 p-6 md:p-10 rounded-2xl border border-[#f0e6e6]">
                    <div>
                        <label className="block text-xs font-bold text-[#8a7373] mb-3 uppercase tracking-[0.2em]">Full Name</label>
                        <input type="text" className="w-full px-4 py-4 bg-white border border-[#eee0e0] rounded focus:outline-none focus:border-[#d9c5c7] font-serif italic text-lg" placeholder="Guest Names" />
                    </div>
                    <button type="submit" className="w-full py-5 bg-[#452b2b] text-[#fdf7f7] font-bold tracking-[0.3em] uppercase rounded hover:bg-[#5a3b3b] transition-all duration-300">Submit RSVP</button>
                </form>
            </div>
        );

        const OurStory = () => (
            <div className="max-w-3xl mx-auto animate-fade-in pb-20 px-4">
                <div className="text-center mb-20"><h2 className="font-serif text-5xl text-[#452b2b] mb-4 tracking-tight italic">Our Story</h2></div>
                <div className="space-y-24">
                    {["How We Met", "Our First Home", "The Proposal"].map((title, index) => (
                        <div key={index} className={`flex flex-col md:flex-row gap-12 items-center ${index % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}>
                            <div className="flex-1 text-center md:text-left">
                                <span className="text-xs tracking-[0.3em] text-[#8a7373] font-bold uppercase">Chronicle</span>
                                <h3 className="font-serif text-3xl text-[#452b2b] mt-4 mb-6">{title}</h3>
                                <p className="font-serif text-[#8a7373] leading-relaxed italic text-lg">A beautiful journey that brought us here today.</p>
                            </div>
                            <div className="w-40 h-40 rounded-full bg-white border border-[#eee0e0] flex items-center justify-center overflow-hidden">
                                <Icon name="Heart" size={48} className="text-[#e6baba]" strokeWidth={1} />
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const QA = () => (
            <div className="max-w-2xl mx-auto animate-fade-in pb-20 px-4 text-center">
                <div className="text-center mb-16">
                    <p className="text-xs tracking-[0.3em] text-[#8a7373] mb-4 uppercase font-bold">Frequently Asked</p>
                    <h2 className="font-serif italic text-4xl md:text-5xl text-[#452b2b] mb-12 italic">Q & A</h2>
                </div>
                <div className="space-y-8">
                    {[
                        { q: "Dress Code", a: "Coming soon." },
                        { q: "Children", a: "Coming soon." },
                        { q: "Parking", a: "Coming soon." }
                    ].map((item, i) => (
                        <div key={i} className="bg-white/60 p-8 rounded-2xl border border-[#eee0e0] group hover:border-[#d9c5c7] transition-all duration-300">
                            <h3 className="font-sans font-bold text-[#452b2b] mb-4 uppercase tracking-widest text-[10px] md:text-xs">{item.q}</h3>
                            <p className="font-serif text-[#8a7373] italic leading-relaxed text-base md:text-lg">{item.a}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Registry = () => (
            <div className="max-w-3xl mx-auto animate-fade-in text-center pb-20 px-4">
                <h2 className="font-serif text-5xl text-[#452b2b] mb-4 italic">Registry</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
                    <div className="p-12 bg-white rounded-2xl border border-[#eee0e0]">
                        <Icon name="Gift" size={48} className="text-[#e6baba] mx-auto mb-6" strokeWidth={1} />
                        <h3 className="font-sans font-bold text-xl text-[#452b2b] uppercase tracking-widest">Honeymoon Fund</h3>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('Home');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const navLinks = ['Home', 'RSVP', 'Our Story', 'Q&A', 'Registry'];

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 40);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleNavigate = (tab) => {
                setActiveTab(tab);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-[#fdf7f7] font-sans relative">
                    <ScatteredBlossoms />
                    
                    {/* UPDATED: COMPACT NAV BAR HEIGHT (h-16 instead of h-24) */}
                    <header className={`fixed top-0 left-0 right-0 h-16 z-[100] px-6 md:px-12 flex items-center transition-all duration-500 ${scrolled ? 'bg-[#fdf7f7]/90 backdrop-blur-md border-b border-[#f0e6e6]' : 'bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto w-full flex items-center">
                            {/* Left Action: Browse */}
                            <div className="flex-1 flex justify-start">
                                <button 
                                    onClick={() => setIsMenuOpen(true)} 
                                    className="flex flex-col items-start gap-0.5 group"
                                >
                                    <span className="text-[10px] font-black tracking-[0.4em] text-[#452b2b] uppercase transition-all group-hover:pl-2">Menu</span>
                                    <div className="h-[1.5px] w-5 bg-[#d9c5c7] transition-all group-hover:w-8"></div>
                                </button>
                            </div>

                            {/* Center Monogram: Clean Minimalist */}
                            <div className="flex-none">
                                <button 
                                    onClick={() => handleNavigate('Home')} 
                                    className="flex items-center justify-center group"
                                >
                                    <span className="relative font-serif text-xl md:text-2xl font-black text-[#452b2b] tracking-tighter transition-transform duration-500 group-hover:scale-105">
                                        H<span className="text-[#d9c5c7] italic">&</span>A
                                    </span>
                                </button>
                            </div>

                            {/* Right Action: RSVP */}
                            <div className="flex-1 flex justify-end">
                                <button 
                                    onClick={() => handleNavigate('RSVP')}
                                    className="flex flex-col items-end gap-0.5 group"
                                >
                                    <span className="text-[10px] font-black tracking-[0.4em] text-[#452b2b] uppercase transition-all group-hover:pr-2">RSVP</span>
                                    <div className="h-[1.5px] w-5 bg-[#d9c5c7] transition-all group-hover:w-8"></div>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className={`fixed inset-0 z-[110] transition-transform duration-500 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="absolute inset-0 bg-[#452b2b]/10 backdrop-blur-sm" onClick={() => setIsMenuOpen(false)} />
                        <div className="absolute top-0 left-0 bottom-0 w-80 bg-[#fdf7f7] p-10 flex flex-col border-r border-[#f0e6e6]">
                            <button onClick={() => setIsMenuOpen(false)} className="self-end mb-16 text-[#8a7373] transition-transform hover:rotate-90"><Icon name="X" size={28} /></button>
                            <nav className="flex flex-col gap-8">
                                {navLinks.map((link) => (
                                    <button 
                                        key={link} 
                                        onClick={() => {handleNavigate(link); setIsMenuOpen(false);}} 
                                        className={`text-left font-serif text-3xl transition-all duration-300 ${activeTab === link ? 'text-[#452b2b] italic translate-x-2' : 'text-[#8a7373] hover:text-[#452b2b] hover:translate-x-2'}`}
                                    >
                                        {link}
                                    </button>
                                ))}
                            </nav>
                            <div className="mt-auto border-t border-[#d9c5c7] pt-8">
                                <p className="text-[9px] font-bold tracking-[0.4em] text-[#8a7373] uppercase mb-2">Kyoto, Japan</p>
                                <p className="font-serif text-[#452b2b]">June 28, 2026</p>
                            </div>
                        </div>
                    </div>

                    <div className="h-16" />
                    
                    <nav className="pt-8 pb-8 px-4 sticky top-0 bg-[#fdf7f7]/95 backdrop-blur-sm z-50 border-b border-[#f0e6e6]/50">
                        <div className="max-w-4xl mx-auto flex justify-center">
                            <ul className="inline-flex items-center justify-center p-1 bg-white/40 rounded-full border border-[#d9c5c7]/30 shadow-sm">
                                {navLinks.map((link) => (
                                    <li key={link} className="relative">
                                        <button 
                                            onClick={() => handleNavigate(link)} 
                                            className={`relative z-10 px-4 md:px-7 py-2 text-[9px] md:text-[10px] font-bold tracking-[0.25em] uppercase transition-all duration-500 rounded-full ${
                                                activeTab === link ? 'text-[#fdf7f7]' : 'text-[#8a7373] hover:text-[#452b2b]'
                                            }`}
                                        >
                                            {link}
                                        </button>
                                        {activeTab === link && <div className="absolute inset-0 bg-[#452b2b] rounded-full z-0 animate-fade-in" />}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto pt-12 relative z-10 px-6">
                        {activeTab === 'Home' && <Home onNavigate={handleNavigate} />}
                        {activeTab === 'RSVP' && <RSVP />}
                        {activeTab === 'Our Story' && <OurStory />}
                        {activeTab === 'Q&A' && <QA />}
                        {activeTab === 'Registry' && <Registry />}
                    </main>

                    <footer className="mt-40 text-center pb-20 relative z-10">
                        <ExactFloralEmblem className="w-16 h-16 opacity-60 mx-auto mb-6 text-[#d9c5c7]" />
                        <h2 className="font-sans font-extrabold text-4xl text-[#452b2b] tracking-widest">H <span className="ampersand text-5xl">&</span> A</h2>
                        <p className="font-serif text-base text-[#8a7373] italic tracking-[0.4em] mt-4 uppercase">06.28.2026</p>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
